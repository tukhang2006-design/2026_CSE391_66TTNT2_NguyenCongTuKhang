<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý điểm sinh viên</title>
<link rel="stylesheet" href="quan_ly_diem.css">
</head>

<body>

<h2>Quản lý điểm sinh viên</h2>

<div class="input-area">
<input type="text" id="name" placeholder="Họ tên">
<input type="number" id="score" placeholder="Điểm (0-10)">
<button id="addBtn">Thêm</button>
</div>

<table>
<thead>
<tr>
<th>STT</th>
<th>Họ tên</th>
<th>Điểm</th>
<th>Xếp loại</th>
<th>Thao tác</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<div class="stats">
<span id="total">Tổng SV: 0</span>
<span id="avg">Điểm TB: 0</span>
</div>

<script src="quan_ly_diem.js"></script>
</body>
</html>
