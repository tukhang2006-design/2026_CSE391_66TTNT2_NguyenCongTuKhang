<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Đăng ký</title>

<script src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.2.1.min.js"></script>
<script src="https://ajax.aspnetcdn.com/ajax/jquery.validate/1.9/jquery.validate.min.js"></script>

<link rel="stylesheet" href="dangKy_caiTien_2.css">
<script src="dangKy_caiTien_2.js"></script>

</head>

<body>

<div id="main">

<form id="demoForm">

<div id="progress">
<div id="progressBar"></div>
<span id="stepText">Bước 1 / 3</span>
</div>

<!-- STEP 1 -->
<div class="step">

<h3>Thông tin cá nhân</h3>

<p>
<label>Họ và tên</label>
<input type="text" name="fullName">
</p>

<p>
<label>Ngày sinh</label>
<input type="date" name="birth">
</p>

<p class="gender">
<span class="field-label">Giới tính</span>
<span class="field-controls">
<label><input type="radio" name="gender" value="male"> Nam</label>
<label><input type="radio" name="gender" value="female"> Nữ</label>
</span>
</p>

<button type="button" id="next1">Tiếp theo</button>

</div>

<!-- STEP 2 -->

<div class="step">

<h3>Thông tin tài khoản</h3>

<p>
<label>Email</label>
<input type="text" name="user">
</p>

<p>
<label>Mật khẩu</label>
<input id="password" type="password" name="password">
</p>

<p>
<label>Xác nhận mật khẩu</label>
<input type="password" name="re-password">
</p>

<button type="button" id="back1">Quay lại</button>
<button type="button" id="next2">Tiếp theo</button>

</div>

<!-- STEP 3 -->

<div class="step">

<h3>Xác nhận thông tin</h3>

<div id="confirmBox"></div>

<button type="button" id="back2">Quay lại</button>
<input type="submit" value="Đăng ký">

</div>

</form>
</div>

</body>
</html>
